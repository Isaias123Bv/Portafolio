<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataVision | Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --sidebar:#020617;
  --card:#0f172a;
  --primary:#22c55e;
  --accent:#38bdf8;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

.light{
  --bg:#f1f5f9;
  --sidebar:#ffffff;
  --card:#ffffff;
  --text:#020617;
  --muted:#475569;
}

/* GLOBAL */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  transition:.3s;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  color:#fff;
  font-size:20px;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  height:100vh;
  background:var(--sidebar);
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.sidebar a{
  text-decoration:none;
  color:var(--muted);
  padding:10px;
  border-radius:8px;
}

.sidebar a:hover{
  background:var(--card);
  color:var(--text);
}

/* MAIN */
.main{
  flex:1;
  padding:25px 35px;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.controls{
  display:flex;
  gap:10px;
}

/* BUTTON */
.btn{
  background:var(--primary);
  color:#000;
  padding:8px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* KPIs */
.kpis{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin:20px 0;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:.2s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 25px 50px rgba(0,0,0,0.6);
}

.metric{
  font-size:28px;
  font-weight:700;
}

.muted{color:var(--muted)}

/* COLORS KPI */
.positive{color:#22c55e}
.warning{color:#f59e0b}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:12px;
  border-bottom:1px solid #1e293b;
}

/* FILTER */
.filters{
  margin:15px 0;
  display:flex;
  gap:10px;
}

/* ANIMATION */
.fade-in{
  opacity:0;
  transform:translateY(20px);
  transition:.6s;
}

.fade-in.visible{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div id="loader">Cargando dashboard...</div>

<div class="sidebar">
  <h2>DataVision</h2>
  <a href="#">Dashboard</a>
  <a href="#">Analytics</a>
  <a href="#">Usuarios</a>
</div>

<div class="main">

  <div class="topbar">
    <div>
      <h1>Dashboard de Analítica</h1>
      <span class="muted">Monitoreo de métricas en tiempo real</span>
    </div>
    <div class="controls">
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    <a href="../Portafolio/Portafolio_Web.html" class="btn">Volver</a>
  </div>

  <p class="muted">
    Visualización de datos empresariales con filtros dinámicos y KPIs.
  </p>

  <!-- FILTER -->
  <div class="filters">
    <input type="date" id="start">
    <input type="date" id="end">
    <button class="btn" onclick="filterData()">Filtrar</button>
  </div>

  <!-- KPIs -->
  <div class="kpis">
    <div class="card">
      <h3>Usuarios</h3>
      <div class="metric positive" id="users">0</div>
    </div>
    <div class="card">
      <h3>Ventas</h3>
      <div class="metric" id="sales">$0</div>
    </div>
    <div class="card">
      <h3>Conversiones</h3>
      <div class="metric warning" id="conv">0%</div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="grid">
    <div class="card"><canvas id="barChart"></canvas></div>
    <div class="card"><canvas id="lineChart"></canvas></div>
  </div>

  <!-- TABLE -->
  <div class="card" style="margin-top:20px">
    <h3>Transacciones</h3>
    <table id="table"></table>
  </div>

</div>

<script>

/* LOADER */
window.onload = ()=>{
  document.getElementById('loader').style.display='none';
}

/* DARK MODE */
function toggleTheme(){
  document.body.classList.toggle('light');
}

/* FAKE API */
const API = [
  {date:"2026-01-01", sales:200, users:50},
  {date:"2026-02-01", sales:400, users:80},
  {date:"2026-03-01", sales:300, users:65},
  {date:"2026-04-01", sales:600, users:120}
];

let filtered = [...API];

/* FILTER */
function filterData(){
  const start = document.getElementById('start').value;
  const end = document.getElementById('end').value;

  filtered = API.filter(d =>
    (!start || d.date >= start) &&
    (!end || d.date <= end)
  );

  update();
}

/* CHARTS */
let barChart, lineChart;

function createCharts(){
  barChart = new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:[],datasets:[{label:'Ventas',data:[]}]},
    options:{
      plugins:{
        tooltip:{
          backgroundColor:"#020617",
          titleColor:"#fff",
          bodyColor:"#9ca3af"
        }
      }
    }
  });

  lineChart = new Chart(document.getElementById('lineChart'),{
    type:'line',
    data:{labels:[],datasets:[{label:'Usuarios',data:[]}]}
  });
}

/* UPDATE */
function update(){
  const labels = filtered.map(d=>d.date);
  const sales = filtered.map(d=>d.sales);
  const users = filtered.map(d=>d.users);

  barChart.data.labels = labels;
  barChart.data.datasets[0].data = sales;
  barChart.update();

  lineChart.data.labels = labels;
  lineChart.data.datasets[0].data = users;
  lineChart.update();

  // KPIs
  document.getElementById('users').innerText = users.reduce((a,b)=>a+b,0);
  document.getElementById('sales').innerText = "$"+sales.reduce((a,b)=>a+b,0);
  document.getElementById('conv').innerText =
    Math.round((users.reduce((a,b)=>a+b,0)/1000)*100)+"%";

  // TABLE
  const table = document.getElementById('table');

  if(filtered.length === 0){
    table.innerHTML = `<tr><td colspan="3">Sin datos en este rango</td></tr>`;
    return;
  }

  table.innerHTML = "";
  filtered.forEach(d=>{
    table.innerHTML += `<tr>
      <td>${d.date}</td>
      <td>$${d.sales}</td>
      <td>${d.users}</td>
    </tr>`;
  });
}

/* ANIMATION */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('visible');
    }
  });
});

document.querySelectorAll('.card').forEach(el=>{
  el.classList.add('fade-in');
  observer.observe(el);
});

createCharts();
update();

</script>

</body>
</html>
